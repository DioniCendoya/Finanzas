<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

const TIPO = { INGRESO: "ingreso", GASTO: "gasto", TRANSFERENCIA: "transferencia" };
const COLORS = ["#e11d48","#2563eb","#16a34a","#f59e0b","#7c3aed","#0891b2","#db2777","#65a30d","#ea580c","#4338ca","#0d9488","#78716c"];

function uid(p) { return `${p}_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`; }
function todayStr() { return new Date().toISOString().slice(0, 10); }
function formatMoney(n) {
  const num = Number(n) || 0;
  return num.toLocaleString("es-AR", { style: "currency", currency: "ARS", maximumFractionDigits: 2 });
}
function round2(n) { return Math.round((Number(n) + Number.EPSILON) * 100) / 100; }
function genId(p) { return `${p}_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`; }

// Simplificación de deudas (greedy: empareja al que más debe con el que más le
// deben). A lo sumo n-1 transferencias. El mínimo exacto es NP-difícil; para
// grupos chicos este resultado es óptimo en la práctica.
function simplifyDebts(balances) {
  const acreedores = balances.filter((b) => b.net > 0.005).map((b) => ({ id: b.id, val: b.net }));
  const deudores = balances.filter((b) => b.net < -0.005).map((b) => ({ id: b.id, val: -b.net }));
  acreedores.sort((a, b) => b.val - a.val);
  deudores.sort((a, b) => b.val - a.val);
  const txs = [];
  let i = 0, j = 0;
  while (i < deudores.length && j < acreedores.length) {
    const pago = round2(Math.min(deudores[i].val, acreedores[j].val));
    if (pago > 0.005) txs.push({ de: deudores[i].id, a: acreedores[j].id, monto: pago });
    deudores[i].val = round2(deudores[i].val - pago);
    acreedores[j].val = round2(acreedores[j].val - pago);
    if (deudores[i].val <= 0.005) i++;
    if (acreedores[j].val <= 0.005) j++;
  }
  return txs;
}

// Calcula pagado/consumido por persona, balance neto y liquidación de un evento.
function computeEvento(evento) {
  const porPersona = {};
  (evento.personas || []).forEach((p) => { porPersona[p.id] = { id: p.id, nombre: p.nombre, uid: p.uid || null, pagado: 0, consumido: 0 }; });
  (evento.gastos || []).forEach((g) => {
    if (porPersona[g.pagadoPor]) porPersona[g.pagadoPor].pagado = round2(porPersona[g.pagadoPor].pagado + Number(g.monto));
    (g.participantes || []).forEach((pt) => { if (porPersona[pt.pid]) porPersona[pt.pid].consumido = round2(porPersona[pt.pid].consumido + Number(pt.monto)); });
  });
  const balances = Object.values(porPersona).map((v) => ({ ...v, net: round2(v.pagado - v.consumido) }));
  return { balances, liquidacion: simplifyDebts(balances) };
}

function getPeriodRange(preset, customStart, customEnd) {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  const fmt = (d) => d.toISOString().slice(0, 10);
  if (preset === "mes_actual") return { start: fmt(new Date(y, m, 1)), end: fmt(new Date(y, m + 1, 0)) };
  if (preset === "mes_pasado") return { start: fmt(new Date(y, m - 1, 1)), end: fmt(new Date(y, m, 0)) };
  if (preset === "ultimos_3") return { start: fmt(new Date(y, m - 2, 1)), end: fmt(new Date(y, m + 1, 0)) };
  if (preset === "anio_actual") return { start: fmt(new Date(y, 0, 1)), end: fmt(new Date(y, 11, 31)) };
  return { start: customStart || fmt(new Date(y, m, 1)), end: customEnd || fmt(now) };
}

function useLiveQuery(fb, buildQuery, deps) {
  const [items, setItems] = useState([]);
  const [pending, setPending] = useState(false);
  const [loaded, setLoaded] = useState(false);
  useEffect(() => {
    const q = buildQuery();
    if (!q) return;
    const unsub = fb.onSnapshot(
      q, { includeMetadataChanges: true },
      (snap) => {
        setItems(snap.docs.map((d) => ({ id: d.id, ...d.data() })));
        setPending(snap.docs.some((d) => d.metadata.hasPendingWrites));
        setLoaded(true);
      },
      (err) => { console.error(err); setLoaded(true); }
    );
    return () => unsub();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, deps);
  return { items, pending, loaded };
}

function PieChartCard({ title, data, onSelectSlice }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!canvasRef.current || !window.Chart) return;
    if (chartRef.current) chartRef.current.destroy();
    if (!data.length) return;
    const ctx = canvasRef.current.getContext("2d");
    chartRef.current = new Chart(ctx, {
      type: "pie",
      data: { labels: data.map((d) => d.label), datasets: [{ data: data.map((d) => d.value), backgroundColor: data.map((_, i) => COLORS[i % COLORS.length]) }] },
      options: {
        plugins: { legend: { position: "bottom", labels: { boxWidth: 11, font: { size: 11 } } } },
        onClick: (evt, elements) => { if (elements.length && onSelectSlice) onSelectSlice(data[elements[0].index].id); },
      },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [data]);

  return (
    <div className="rounded-lg border border-slate-200 bg-white p-4">
      <div className="text-sm font-medium mb-3">{title}</div>
      {data.length ? <div className="max-w-[280px] mx-auto"><canvas ref={canvasRef}></canvas></div> : <p className="text-sm text-slate-400">Sin datos en este período.</p>}
    </div>
  );
}

function LineChartCard({ title, labels, datasets, empty, yFormatter }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!canvasRef.current || !window.Chart) return;
    if (chartRef.current) chartRef.current.destroy();
    if (empty) return;
    const ctx = canvasRef.current.getContext("2d");
    chartRef.current = new Chart(ctx, {
      type: "line",
      data: {
        labels,
        datasets: datasets.map((d, i) => ({
          label: d.label, data: d.data, borderColor: COLORS[i % COLORS.length],
          backgroundColor: COLORS[i % COLORS.length], tension: 0.25, pointRadius: 2, spanGaps: true,
        })),
      },
      options: {
        interaction: { mode: "index", intersect: false },
        plugins: { legend: { position: "bottom", labels: { boxWidth: 11, font: { size: 11 } } } },
        scales: {
          y: { ticks: { callback: (v) => (yFormatter ? yFormatter(v) : v), font: { size: 10 } } },
          x: { ticks: { font: { size: 10 }, maxRotation: 45, minRotation: 0 } },
        },
      },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [labels, datasets, empty]);

  return (
    <div className="rounded-lg border border-slate-200 bg-white p-4">
      <div className="text-sm font-medium mb-3">{title}</div>
      {empty ? <p className="text-sm text-slate-400">Sin datos suficientes todavía.</p> : <div className="h-64"><canvas ref={canvasRef}></canvas></div>}
    </div>
  );
}

function LoginScreen({ fb }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  async function handleLogin(e) {
    e.preventDefault();
    setError("");
    setLoading(true);
    try { await fb.signInWithEmailAndPassword(fb.auth, email.trim(), password); }
    catch { setError("No se pudo iniciar sesión. Revisá el email y la contraseña."); }
    finally { setLoading(false); }
  }

  return (
    <div className="min-h-screen bg-slate-50 flex items-center justify-center px-4">
      <form onSubmit={handleLogin} className="w-full max-w-sm rounded-lg border border-slate-200 bg-white p-6 space-y-4">
        <div className="flex items-center gap-2 text-lg font-semibold text-slate-900"><Icon name="wallet" size={20} />Mis finanzas</div>
        {error && <div className="text-sm text-red-600 bg-red-50 border border-red-200 rounded-md px-3 py-2">{error}</div>}
        <div>
          <label className="block text-xs font-medium text-slate-500 mb-1">Email</label>
          <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required className="w-full rounded-md border border-slate-200 px-3 py-2 text-sm" />
        </div>
        <div>
          <label className="block text-xs font-medium text-slate-500 mb-1">Contraseña</label>
          <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} required className="w-full rounded-md border border-slate-200 px-3 py-2 text-sm" />
        </div>
        <button type="submit" disabled={loading} className="w-full rounded-md bg-slate-900 text-white px-4 py-2 text-sm font-medium hover:bg-slate-800 disabled:opacity-50">
          {loading ? "Entrando..." : "Entrar"}
        </button>
      </form>
    </div>
  );
}

function OnboardingScreen({ fb, uid }) {
  const [nombre, setNombre] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  async function handleSubmit(e) {
    e.preventDefault();
    setError("");
    if (!nombre.trim()) return setError("Poné tu nombre.");
    setLoading(true);
    try { await fb.setDoc(fb.doc(fb.db, "personas", uid), { nombre: nombre.trim() }); }
    catch { setError("No se pudo guardar. Revisá tu conexión."); }
    finally { setLoading(false); }
  }
  return (
    <div className="min-h-screen bg-slate-50 flex items-center justify-center px-4">
      <form onSubmit={handleSubmit} className="w-full max-w-sm rounded-lg border border-slate-200 bg-white p-6 space-y-4">
        <div className="text-lg font-semibold">¡Bienvenido/a!</div>
        <p className="text-sm text-slate-500">Es la primera vez que entrás con este usuario. ¿Cómo te llamás? Así te reconoce la otra persona en los gastos compartidos.</p>
        {error && <div className="text-sm text-red-600 bg-red-50 border border-red-200 rounded-md px-3 py-2">{error}</div>}
        <input type="text" value={nombre} onChange={(e) => setNombre(e.target.value)} placeholder="Tu nombre" className="w-full rounded-md border border-slate-200 px-3 py-2 text-sm" />
        <button type="submit" disabled={loading} className="w-full rounded-md bg-slate-900 text-white px-4 py-2 text-sm font-medium hover:bg-slate-800 disabled:opacity-50">
          {loading ? "Guardando..." : "Continuar"}
        </button>
      </form>
    </div>
  );
}

// Selector inline para categorizar un gasto compartido pendiente (mi categoría propia).
function PendingCategoryPicker({ tx, misCategoriasGasto, onAssign, onCreateAndAssign }) {
  const [open, setOpen] = useState(false);
  const [val, setVal] = useState("");
  const [nuevaNombre, setNuevaNombre] = useState("");
  if (!open) {
    return (
      <button onClick={() => setOpen(true)} className="text-[11px] text-amber-600 hover:text-amber-800 underline shrink-0">
        Elegir categoría
      </button>
    );
  }
  return (
    <div className="flex items-center gap-1.5 shrink-0">
      <select value={val} onChange={(e) => setVal(e.target.value)} className="text-xs rounded border border-slate-200 px-1.5 py-1">
        <option value="">Elegir...</option>
        {misCategoriasGasto.map((c) => <option key={c.id} value={c.id}>{c.nombre}</option>)}
        <option value="__nueva__">+ Nueva categoría</option>
      </select>
      {val === "__nueva__" ? (
        <>
          <input type="text" value={nuevaNombre} onChange={(e) => setNuevaNombre(e.target.value)} placeholder="Nombre" className="text-xs rounded border border-slate-200 px-1.5 py-1 w-24" />
          <button onClick={() => nuevaNombre.trim() && onCreateAndAssign(tx.id, nuevaNombre.trim())} className="text-xs text-emerald-600 font-medium">Crear</button>
        </>
      ) : (
        val && <button onClick={() => onAssign(tx.id, val)} className="text-xs text-emerald-600 font-medium">Guardar</button>
      )}
    </div>
  );
}

  return (
    <div className="rounded-lg border border-slate-200 bg-white divide-y divide-slate-100">
      {items.map((t) => {
        const pendienteCategoria = t.tipo === TIPO.GASTO && !t.categoriaId;
        return (
          <div key={t.id} className="flex items-center justify-between px-4 py-2.5 gap-2">

                <span className={`inline-flex items-center justify-center w-5 h-5 rounded-full shrink-0 ${
                  t.tipo === TIPO.INGRESO ? "bg-emerald-100 text-emerald-600" : t.tipo === TIPO.GASTO ? "bg-red-100 text-red-600" : "bg-slate-100 text-slate-600"}`}>
                  <Icon name={t.tipo === TIPO.INGRESO ? "up" : t.tipo === TIPO.GASTO ? "down" : "swap"} size={11} />
                </span>
                <span className="font-medium truncate">
                  {t.tipo === TIPO.TRANSFERENCIA ? `${accountName(t.cuentaId)} → ${accountName(t.cuentaDestinoId)}` : (pendienteCategoria ? "Sin categorizar" : categoryName(t.categoriaId))}
                </span>

                {pendienteCategoria && misCategoriasGasto && (

                {t.fecha} {t.descripcion ? `· ${t.descripcion}` : ""}

              </div>
            </div>

              <span className={`text-sm font-semibold ${t.tipo === TIPO.INGRESO ? "text-emerald-600" : t.tipo === TIPO.GASTO ? "text-red-600" : "text-slate-700"}`}>

              <button onClick={() => onDelete(t.id)} className="text-slate-300 hover:text-red-500"><Icon name="trash" size={14} /></button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// Envoltorio que detecta swipe horizontal (touch) para moverse entre las
// "ventanas" de una misma categoría, con indicadores clicleables como respaldo.
function SwipeViews({ views, activeId, onChange, children }) {
  const startX = useRef(null);
  const startY = useRef(null);
  const dragging = useRef(false);
  const activeIndex = Math.max(0, views.findIndex((v) => v.id === activeId));

  function onTouchStart(e) {
    startX.current = e.touches[0].clientX;
    startY.current = e.touches[0].clientY;
    dragging.current = true;
  }
  function onTouchEnd(e) {
    if (!dragging.current || startX.current == null) return;
    dragging.current = false;
    const dx = e.changedTouches[0].clientX - startX.current;
    const dy = e.changedTouches[0].clientY - startY.current;
    const THRESHOLD = 45;
    if (Math.abs(dx) > THRESHOLD && Math.abs(dx) > Math.abs(dy)) {
      if (dx < 0 && activeIndex < views.length - 1) onChange(views[activeIndex + 1].id);
      else if (dx > 0 && activeIndex > 0) onChange(views[activeIndex - 1].id);
    }
    startX.current = null;
  }

  return (
    <div>
      {views.length > 1 && (
        <div className="flex items-center justify-center gap-3 mb-4 flex-wrap">
          {views.map((v) => (
            <button key={v.id} onClick={() => onChange(v.id)}
              className={`flex items-center gap-1.5 text-xs font-medium px-2 py-1 rounded-full transition-colors ${
                v.id === activeId ? "bg-slate-900 text-white" : "text-slate-400 hover:text-slate-600"}`}>
              {v.label}
            </button>
          ))}
        </div>
      )}
      <div onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
        {children}
      </div>
      {views.length > 1 && (
        <div className="flex items-center justify-center gap-1.5 mt-4">
          {views.map((v) => (
            <span key={v.id} className={`h-1.5 rounded-full transition-all ${v.id === activeId ? "w-5 bg-slate-900" : "w-1.5 bg-slate-300"}`} />
          ))}
        </div>
      )}
    </div>
  );
}

// ============================ EVENTOS ============================
// Un evento es una herramienta de reparto autocontenida: personas (con o sin app)
// y gastos viven dentro del propio documento. Al finalizar se congela la liquidación
// y se guarda el "share" (lo consumido) de cada usuario de la app. Cada usuario se
// carga su propio gasto desde su cliente (ver efecto en FinanceApp), así ninguno
// escribe transacciones del otro.

function EventosSection({ fb, uid, personas, eventos, setError }) {
  const [selId, setSelId] = useState(null);
  const [nuevoNombre, setNuevoNombre] = useState("");
  const evento = eventos.find((e) => e.id === selId) || null;

  const abiertos = eventos.filter((e) => !e.finalizado).sort((a, b) => (b.creadoEnMs || 0) - (a.creadoEnMs || 0));
  const finalizados = eventos.filter((e) => e.finalizado).sort((a, b) => (b.finalizadoEnMs || 0) - (a.finalizadoEnMs || 0));

  async function patchEvento(id, data) {
    try { await fb.updateDoc(fb.doc(fb.db, "eventos", id), data); }
    catch { setError("No se pudo guardar el evento (queda pendiente si estás sin conexión)."); }
  }
  async function borrarEvento(id) {
    if (!window.confirm("¿Borrar este evento? No se puede deshacer.")) return;
    try { await fb.deleteDoc(fb.doc(fb.db, "eventos", id)); if (selId === id) setSelId(null); }
    catch { setError("No se pudo borrar el evento."); }
  }
  async function crearEvento(e) {
    e.preventDefault();
    setError("");
    if (!nuevoNombre.trim()) return setError("Ponele un nombre al evento.");
    const yo = personas.find((p) => p.id === uid);
    const personasIni = yo ? [{ id: uid, nombre: yo.nombre, uid }] : [];
    try {
      const ref = await fb.addDoc(fb.collection(fb.db, "eventos"), {
        nombre: nuevoNombre.trim(), creadoPor: uid, creadoEnMs: Date.now(),
        finalizado: false, personas: personasIni, gastos: [],
      });
      setNuevoNombre(""); setSelId(ref.id);
    } catch { setError("No se pudo crear el evento."); }
  }

  if (evento) {
    return <EventoDetalle fb={fb} uid={uid} personas={personas} evento={evento} setError={setError} onBack={() => setSelId(null)} patchEvento={patchEvento} onBorrar={() => borrarEvento(evento.id)} />;
  }

  return (
    <div className="space-y-4">
      <form onSubmit={crearEvento} className="rounded-lg border border-slate-200 bg-white p-4 flex gap-2 items-end">
        <div className="flex-1">
          <label className="block text-xs font-medium text-slate-500 mb-1">Nuevo evento</label>
          <input type="text" value={nuevoNombre} onChange={(e) => setNuevoNombre(e.target.value)} placeholder="Ej: Asado, viaje a la costa..." className="w-full rounded-md border border-slate-200 px-3 py-2 text-sm" />
        </div>
        <button type="submit" className="flex items-center gap-1.5 rounded-md bg-slate-900 text-white px-4 py-2 text-sm font-medium hover:bg-slate-800"><Icon name="plus" size={14} />Crear</button>
      </form>

      {abiertos.length > 0 && (
        <div>
          <div className="text-sm font-medium text-slate-700 mb-2">Eventos abiertos</div>
          <div className="rounded-lg border border-slate-200 bg-white divide-y divide-slate-100">
            {abiertos.map((e) => (
              <button key={e.id} onClick={() => setSelId(e.id)} className="w-full text-left px-4 py-3 hover:bg-slate-50 flex items-center justify-between gap-2">
                <span className="text-sm font-medium truncate">{e.nombre}</span>
                <span className="text-xs text-slate-400 shrink-0">{(e.personas || []).length} pers · {(e.gastos || []).length} gasto{(e.gastos || []).length === 1 ? "" : "s"}</span>
              </button>
            ))}
          </div>
        </div>
      )}

      <div>
        <div className="text-sm font-medium text-slate-700 mb-2">Historial de eventos</div>
        {finalizados.length === 0 ? <p className="text-sm text-slate-400">Todavía no finalizaste ningún evento.</p> : (
          <div className="rounded-lg border border-slate-200 bg-white divide-y divide-slate-100">
            {finalizados.map((e) => (
              <button key={e.id} onClick={() => setSelId(e.id)} className="w-full text-left px-4 py-3 hover:bg-slate-50 flex items-center justify-between gap-2">
                <span className="text-sm font-medium truncate flex items-center gap-1.5"><Icon name="check" size={13} className="text-emerald-500" />{e.nombre}</span>
                <span className="text-xs text-slate-400 shrink-0">{e.finalizadoEnMs ? new Date(e.finalizadoEnMs).toLocaleDateString("es-AR") : ""}</span>
              </button>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function EventoDetalle({ fb, uid, personas, evento, setError, onBack, patchEvento, onBorrar }) {
  const finalizado = !!evento.finalizado;
  const personasEvento = evento.personas || [];
  const gastos = evento.gastos || [];

  const { balances, liquidacion } = useMemo(() => computeEvento(evento), [evento]);
  const nombreDe = (id) => (personasEvento.find((p) => p.id === id)?.nombre || "—");

  const [extNombre, setExtNombre] = useState("");
  const appDisponibles = personas.filter((p) => !personasEvento.some((pe) => pe.uid === p.id));

  function agregarApp(p) {
    if (finalizado || personasEvento.some((pe) => pe.uid === p.id)) return;
    patchEvento(evento.id, { personas: [...personasEvento, { id: p.id, nombre: p.nombre, uid: p.id }] });
  }
  function agregarExterna(e) {
    e.preventDefault();
    if (finalizado || !extNombre.trim()) return;
    patchEvento(evento.id, { personas: [...personasEvento, { id: genId("ext"), nombre: extNombre.trim(), uid: null }] });
    setExtNombre("");
  }
  function quitarPersona(pid) {
    const usada = gastos.some((g) => g.pagadoPor === pid || (g.participantes || []).some((pt) => pt.pid === pid));
    if (usada) return setError("No se puede quitar: participa en algún gasto.");
    patchEvento(evento.id, { personas: personasEvento.filter((p) => p.id !== pid) });
  }

  const [gDesc, setGDesc] = useState("");
  const [gMonto, setGMonto] = useState("");
  const [gFecha, setGFecha] = useState(todayStr());
  const [gPagadoPor, setGPagadoPor] = useState("");
  const [gModo, setGModo] = useState("igual");
  const [gParts, setGParts] = useState({});

  useEffect(() => {
    setGParts((prev) => {
      const next = {};
      personasEvento.forEach((p) => { next[p.id] = prev[p.id] || { on: true, monto: "" }; });
      return next;
    });
  }, [personasEvento.length]);
  useEffect(() => { if (!gPagadoPor && personasEvento.length) setGPagadoPor(personasEvento[0].id); }, [personasEvento.length]);

  const checkedPids = personasEvento.filter((p) => gParts[p.id]?.on).map((p) => p.id);

  useEffect(() => {
    if (gModo !== "igual") return;
    const total = Number(gMonto) || 0;
    const n = checkedPids.length;
    setGParts((prev) => {
      const next = { ...prev };
      let acc = 0;
      checkedPids.forEach((pid, i) => {
        const base = n ? round2(total / n) : 0;
        const m = i === n - 1 ? round2(total - acc) : base;
        acc = round2(acc + m);
        next[pid] = { on: true, monto: n && total ? String(m) : "" };
      });
      personasEvento.forEach((p) => { if (!checkedPids.includes(p.id)) next[p.id] = { on: false, monto: "" }; });
      return next;
    });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [gMonto, checkedPids.join(","), gModo]);

  function toggleParticipante(pid) { setGParts((prev) => ({ ...prev, [pid]: { ...prev[pid], on: !prev[pid]?.on } })); }
  function setMontoManual(pid, val) { setGModo("manual"); setGParts((prev) => ({ ...prev, [pid]: { on: true, monto: val } })); }

  const sumaParts = round2(checkedPids.reduce((s, pid) => s + (Number(gParts[pid]?.monto) || 0), 0));
  const totalNum = Number(gMonto) || 0;

  function agregarGasto(e) {
    e.preventDefault();
    setError("");
    if (!totalNum || totalNum <= 0) return setError("El monto del gasto tiene que ser mayor a cero.");
    if (!gPagadoPor) return setError("Elegí quién pagó.");
    if (!checkedPids.length) return setError("Elegí al menos una persona en el gasto.");
    if (Math.abs(sumaParts - totalNum) > 0.01) return setError(`Las partes suman ${formatMoney(sumaParts)} y el total es ${formatMoney(totalNum)}.`);
    const participantes = checkedPids.map((pid) => ({ pid, monto: round2(Number(gParts[pid]?.monto) || 0) }));
    const nuevo = { id: genId("g"), descripcion: gDesc.trim(), monto: round2(totalNum), fecha: gFecha || todayStr(), pagadoPor: gPagadoPor, participantes };
    patchEvento(evento.id, { gastos: [...gastos, nuevo] });
    setGDesc(""); setGMonto(""); setGFecha(todayStr()); setGModo("igual");
  }
  function quitarGasto(gid) { patchEvento(evento.id, { gastos: gastos.filter((g) => g.id !== gid) }); }

  function finalizar() {
    setError("");
    if (!gastos.length) return setError("Agregá al menos un gasto antes de finalizar.");
    if (!window.confirm("Al finalizar, el evento queda de solo lectura y a cada persona de la app se le carga su parte para categorizar. ¿Confirmás?")) return;
    const { balances: b, liquidacion: liq } = computeEvento(evento);
    const sharesPorUid = {};
    b.forEach((x) => { if (x.uid) sharesPorUid[x.uid] = x.consumido; });
    patchEvento(evento.id, { finalizado: true, finalizadoEnMs: Date.now(), liquidacion: liq, balances: b, sharesPorUid });
  }

  function compartirImagen() {
    const dpr = Math.max(2, window.devicePixelRatio || 1);
    const W = 620, pad = 28, rowH = 46;
    const filas = Math.max(1, liquidacion.length);
    const H = 150 + filas * rowH + 24;
    const c = document.createElement("canvas");
    c.width = W * dpr; c.height = H * dpr;
    const ctx = c.getContext("2d"); ctx.scale(dpr, dpr);
    ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = "#0f172a"; ctx.font = "600 26px -apple-system,Helvetica,Arial";
    ctx.fillText(evento.nombre, pad, 50);
    ctx.fillStyle = "#64748b"; ctx.font = "14px -apple-system,Helvetica,Arial";
    const fecha = evento.finalizadoEnMs ? new Date(evento.finalizadoEnMs).toLocaleDateString("es-AR") : new Date().toLocaleDateString("es-AR");
    ctx.fillText("Cómo saldar las cuentas · " + fecha, pad, 76);
    ctx.strokeStyle = "#e2e8f0"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad, 100); ctx.lineTo(W - pad, 100); ctx.stroke();
    let y = 140;
    if (!liquidacion.length) {
      ctx.fillStyle = "#334155"; ctx.font = "16px -apple-system,Helvetica,Arial";
      ctx.fillText("Todo saldado, nadie debe nada.", pad, y);
    } else {
      liquidacion.forEach((t) => {
        ctx.fillStyle = "#334155"; ctx.font = "16px -apple-system,Helvetica,Arial"; ctx.textAlign = "left";
        ctx.fillText(`${nombreDe(t.de)}  →  ${nombreDe(t.a)}`, pad, y);
        ctx.fillStyle = "#0f172a"; ctx.font = "600 16px -apple-system,Helvetica,Arial"; ctx.textAlign = "right";
        ctx.fillText(formatMoney(t.monto), W - pad, y); ctx.textAlign = "left";
        y += rowH;
      });
    }
    c.toBlob(async (blob) => {
      if (!blob) return;
      const file = new File([blob], `${evento.nombre}.png`, { type: "image/png" });
      try {
        if (navigator.canShare && navigator.canShare({ files: [file] })) { await navigator.share({ files: [file], title: evento.nombre }); return; }
      } catch (e) {}
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a"); a.href = url; a.download = `${evento.nombre}.png`;
      document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    }, "image/png");
  }

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between gap-2">
        <button onClick={onBack} className="flex items-center gap-1.5 text-sm text-slate-500 hover:text-slate-800"><Icon name="back" size={15} />Eventos</button>
        {finalizado
          ? <span className="text-[10px] uppercase tracking-wide bg-emerald-50 text-emerald-600 px-2 py-1 rounded flex items-center gap-1"><Icon name="check" size={11} />Finalizado</span>
          : <button onClick={onBorrar} className="text-slate-300 hover:text-red-500" title="Borrar evento"><Icon name="trash" size={15} /></button>}
      </div>

      <div>
        <h2 className="text-lg font-semibold">{evento.nombre}</h2>
        {finalizado && <p className="text-xs text-slate-400">Finalizado el {evento.finalizadoEnMs ? new Date(evento.finalizadoEnMs).toLocaleDateString("es-AR") : ""}</p>}
      </div>

      <div className="rounded-lg border border-slate-200 bg-white p-4">
        <div className="flex items-center justify-between mb-3">
          <div className="flex items-center gap-2 text-sm font-medium text-slate-700"><Icon name="scale" size={16} />{finalizado ? "Cómo saldar las cuentas" : "Vista previa de la liquidación"}</div>
          {finalizado && <button onClick={compartirImagen} className="flex items-center gap-1.5 text-xs rounded-md bg-slate-900 text-white px-3 py-1.5 font-medium hover:bg-slate-800"><Icon name="share" size={13} />Compartir imagen</button>}
        </div>
        {liquidacion.length === 0 ? (
          <p className="text-sm text-slate-500">{gastos.length ? "Todo saldado, nadie debe nada." : "Cargá gastos para ver quién le debe a quién."}</p>
        ) : (
          <div className="space-y-1.5">
            {liquidacion.map((t, i) => (
              <div key={i} className="flex items-center justify-between text-sm">
                <span><span className="font-medium">{nombreDe(t.de)}</span> le debe a <span className="font-medium">{nombreDe(t.a)}</span></span>
                <span className="font-semibold">{formatMoney(t.monto)}</span>
              </div>
            ))}
          </div>
        )}
      </div>

      <div className="rounded-lg border border-slate-200 bg-white p-4 space-y-3">
        <div className="flex items-center gap-2 text-sm font-medium text-slate-700"><Icon name="users" size={16} />Personas ({personasEvento.length})</div>
        <div className="flex flex-wrap gap-2">
          {personasEvento.map((p) => (
            <span key={p.id} className="inline-flex items-center gap-1.5 text-sm bg-slate-100 rounded-full pl-3 pr-2 py-1">
              {p.nombre}{p.uid && <span className="text-[9px] uppercase tracking-wide text-indigo-500">app</span>}
              {!finalizado && <button onClick={() => quitarPersona(p.id)} className="text-slate-400 hover:text-red-500"><Icon name="x" size={12} /></button>}
            </span>
          ))}
          {personasEvento.length === 0 && <span className="text-xs text-slate-400">Sin personas todavía.</span>}
        </div>
        {!finalizado && (
          <div className="space-y-2 border-t border-slate-100 pt-3">
            {appDisponibles.length > 0 && (
              <div className="flex flex-wrap items-center gap-2">
                <span className="text-xs text-slate-500">Agregar de la app:</span>
                {appDisponibles.map((p) => (
                  <button key={p.id} onClick={() => agregarApp(p)} className="text-xs rounded-full border border-slate-200 px-2.5 py-1 hover:border-slate-400">+ {p.nombre}</button>
                ))}
              </div>
            )}
            <form onSubmit={agregarExterna} className="flex gap-2">
              <input type="text" value={extNombre} onChange={(e) => setExtNombre(e.target.value)} placeholder="Agregar persona (sin app)" className="flex-1 rounded-md border border-slate-200 px-3 py-1.5 text-sm" />
              <button type="submit" className="text-sm rounded-md border border-slate-200 px-3 py-1.5 hover:border-slate-400">Agregar</button>
            </form>
          </div>
        )}
      </div>

      {!finalizado && personasEvento.length > 0 && (
        <form onSubmit={agregarGasto} className="rounded-lg border border-slate-200 bg-white p-4 space-y-4">
          <div className="text-sm font-medium text-slate-700">Nuevo gasto</div>
          <div className="grid gap-3 sm:grid-cols-2">
            <div>
              <label className="block text-xs font-medium text-slate-500 mb-1">Monto total</label>
              <input type="number" step="0.01" min="0" value={gMonto} onChange={(e) => setGMonto(e.target.value)} placeholder="0.00" className="w-full rounded-md border border-slate-200 px-3 py-2 text-sm" />
            </div>
            <div>
              <label className="block text-xs font-medium text-slate-500 mb-1">¿Quién pagó?</label>
              <select value={gPagadoPor} onChange={(e) => setGPagadoPor(e.target.value)} className="w-full rounded-md border border-slate-200 px-3 py-2 text-sm">
                {personasEvento.map((p) => <option key={p.id} value={p.id}>{p.nombre}</option>)}
              </select>
            </div>
            <div>
              <label className="block text-xs font-medium text-slate-500 mb-1">Fecha</label>
              <input type="date" value={gFecha} onChange={(e) => setGFecha(e.target.value)} className="w-full rounded-md border border-slate-200 px-3 py-2 text-sm" />
            </div>
            <div>
              <label className="block text-xs font-medium text-slate-500 mb-1">Descripción (opcional)</label>
              <input type="text" value={gDesc} onChange={(e) => setGDesc(e.target.value)} placeholder="Ej: carne, nafta..." className="w-full rounded-md border border-slate-200 px-3 py-2 text-sm" />
            </div>
          </div>

          <div className="border-t border-slate-100 pt-3">
            <div className="flex items-center justify-between mb-2">
              <span className="text-xs font-medium text-slate-500">¿Entre quiénes se divide?</span>
              <button type="button" onClick={() => setGModo("igual")} className={`text-xs underline ${gModo === "igual" ? "text-slate-400" : "text-slate-600"}`}>Partes iguales</button>
            </div>
            <div className="space-y-1.5">
              {personasEvento.map((p) => {
                const on = !!gParts[p.id]?.on;
                return (
                  <div key={p.id} className="flex items-center gap-3">
                    <label className="flex items-center gap-2 flex-1 min-w-0">
                      <input type="checkbox" checked={on} onChange={() => toggleParticipante(p.id)} className="rounded" />
                      <span className={`text-sm truncate ${on ? "" : "text-slate-400"}`}>{p.nombre}</span>
                    </label>
                    <input type="number" step="0.01" min="0" disabled={!on} value={on ? (gParts[p.id]?.monto ?? "") : ""} onChange={(e) => setMontoManual(p.id, e.target.value)} placeholder="0.00" className="w-24 rounded-md border border-slate-200 px-2 py-1.5 text-sm disabled:bg-slate-50 disabled:text-slate-300" />
                  </div>
                );
              })}
            </div>
            <div className={`text-xs mt-2 ${Math.abs(sumaParts - totalNum) > 0.01 && totalNum ? "text-red-500" : "text-slate-400"}`}>
              Suma de partes: {formatMoney(sumaParts)}{totalNum ? ` / total ${formatMoney(totalNum)}` : ""}
            </div>
          </div>

          <button type="submit" className="w-full sm:w-auto flex items-center justify-center gap-1.5 rounded-md bg-slate-900 text-white px-4 py-2 text-sm font-medium hover:bg-slate-800"><Icon name="plus" size={14} />Agregar gasto</button>
        </form>
      )}

      <div>
        <div className="text-sm font-medium text-slate-700 mb-2">Gastos del evento ({gastos.length})</div>
        {gastos.length === 0 ? <p className="text-sm text-slate-400">Todavía no cargaste gastos.</p> : (
          <div className="rounded-lg border border-slate-200 bg-white divide-y divide-slate-100">
            {gastos.slice().sort((a, b) => (a.fecha < b.fecha ? 1 : -1)).map((g) => (
              <div key={g.id} className="px-4 py-3">
                <div className="flex items-center justify-between gap-2 text-sm">
                  <span className="font-medium truncate">{g.descripcion || "Gasto"}</span>
                  <div className="flex items-center gap-3 shrink-0">
                    <span className="font-semibold">{formatMoney(g.monto)}</span>
                    {!finalizado && <button onClick={() => quitarGasto(g.id)} className="text-slate-300 hover:text-red-500"><Icon name="trash" size={14} /></button>}
                  </div>
                </div>
                <div className="text-xs text-slate-400 mt-0.5">
                  {g.fecha} · Pagó {nombreDe(g.pagadoPor)} · {(g.participantes || []).map((pt) => `${nombreDe(pt.pid)} ${formatMoney(pt.monto)}`).join(" · ")}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {!finalizado && (
        <button onClick={finalizar} disabled={!gastos.length} className="w-full flex items-center justify-center gap-1.5 rounded-md bg-slate-900 text-white px-4 py-2.5 text-sm font-medium hover:bg-slate-800 disabled:opacity-40"><Icon name="check" size={15} />Finalizar evento</button>
      )}
    </div>
  );
}

function FinanceApp({ fb, uid, personas, miNombre }) {
  const misCuentasQ = useLiveQuery(fb, () => fb.query(fb.collection(fb.db, "cuentas"), fb.where("personaId", "==", uid)), [uid]);
  const principalesQ = useLiveQuery(fb, () => fb.query(fb.collection(fb.db, "cuentas"), fb.where("esPrincipal", "==", true)), []);
  const misCategoriasQ = useLiveQuery(fb, () => fb.query(fb.collection(fb.db, "categorias"), fb.where("personaId", "==", uid)), [uid]);
  const misTxQ = useLiveQuery(fb, () => fb.query(fb.collection(fb.db, "transacciones"), fb.where("personaId", "==", uid)), [uid]);
  const compartidasQ = useLiveQuery(fb, () => fb.query(fb.collection(fb.db, "transacciones"), fb.where("esCompartido", "==", true)), []);
  const liquidacionesQ = useLiveQuery(fb, () => fb.collection(fb.db, "liquidaciones"), []);
  const eventosQ = useLiveQuery(fb, () => fb.collection(fb.db, "eventos"), []);

  const eventos = eventosQ.items;
  const misCuentas = misCuentasQ.items;
  const principalesAjenas = principalesQ.items.filter((a) => a.personaId !== uid);
  const misCategorias = misCategoriasQ.items;
  const misTransacciones = misTxQ.items;
  const compartidas = compartidasQ.items;
  const liquidaciones = liquidacionesQ.items;
  const hasPending = misCuentasQ.pending || misCategoriasQ.pending || misTxQ.pending || compartidasQ.pending;

  const [online, setOnline] = useState(navigator.onLine);
  useEffect(() => {
    const on = () => setOnline(true), off = () => setOnline(false);
    window.addEventListener("online", on); window.addEventListener("offline", off);
    return () => { window.removeEventListener("online", on); window.removeEventListener("offline", off); };
  }, []);

  // Auto-carga de la parte propia de eventos finalizados. Cada usuario crea SOLO su
  // transacción (id determinístico => idempotente: nunca duplica ni pisa la categoría
  // que ya elegiste). Queda sin categoría, entra al flujo habitual de "sin categorizar".
  const eventoLoadRef = useRef(new Set());
  useEffect(() => {
    if (!eventosQ.loaded || !misTxQ.loaded) return;
    const principal = misCuentas.find((a) => a.esPrincipal);
    eventos.forEach((evt) => {
      if (!evt.finalizado || !evt.sharesPorUid) return;
      const share = Number(evt.sharesPorUid[uid]) || 0;
      if (share <= 0) return;
      const txId = `evt_${evt.id}_${uid}`;
      if (misTransacciones.some((t) => t.id === txId) || eventoLoadRef.current.has(txId)) return;
      if (!principal) return;
      eventoLoadRef.current.add(txId);
      fb.setDoc(fb.doc(fb.db, "transacciones", txId), {
        tipo: TIPO.GASTO, cuentaId: principal.id, personaId: uid, esCompartido: false,
        cuentaDestinoId: null, categoriaId: null, monto: round2(share),
        descripcion: `Evento: ${evt.nombre}`,
        fecha: evt.finalizadoEnMs ? new Date(evt.finalizadoEnMs).toISOString().slice(0, 10) : todayStr(),
        eventoId: evt.id, creadoEnMs: Date.now(),
      }).catch(() => { eventoLoadRef.current.delete(txId); });
    });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [eventos, misTransacciones, misCuentas, eventosQ.loaded, misTxQ.loaded, uid]);

  const [tab, setTab] = useState("resumen");
  const [category, setCategory] = useState("metricas");
  const [lastSubtab, setLastSubtab] = useState({ metricas: "resumen", movimiento: "movimiento", gestion: "cuentas" });
  const [error, setError] = useState("");
  const [filterAccount, setFilterAccount] = useState("todas");

  function personaName(id) { return id === uid ? `${miNombre} (vos)` : (personas.find((p) => p.id === id)?.nombre || "—"); }
  function accountName(id) { return misCuentas.find((a) => a.id === id)?.nombre || principalesAjenas.find((a) => a.id === id)?.nombre || "—"; }
  function accountPersonaId(id) { return misCuentas.find((a) => a.id === id)?.personaId || principalesAjenas.find((a) => a.id === id)?.personaId; }
  function categoryName(id) { return misCategorias.find((c) => c.id === id)?.nombre || "—"; }
  function principalAccountOf(personaId) {
    if (personaId === uid) return misCuentas.find((a) => a.esPrincipal);
    return principalesAjenas.find((a) => a.personaId === personaId);
  }
  const misCategoriasGasto = misCategorias.filter((c) => c.tipo === TIPO.GASTO);
  const misCategoriasIngreso = misCategorias.filter((c) => c.tipo === TIPO.INGRESO);

  // ---- movimiento ----
  const [tType, setTType] = useState(TIPO.GASTO);
  const [tAccount, setTAccount] = useState("");
  const [tToAccount, setTToAccount] = useState("");
  const [tCategory, setTCategory] = useState("");
  const [tAmount, setTAmount] = useState("");
  const [tDesc, setTDesc] = useState("");
  const [tDate, setTDate] = useState(todayStr());
  useEffect(() => { if (!tAccount && misCuentas.length) setTAccount(misCuentas[0].id); }, [misCuentas]);
  const categoriasFiltradas = tType === TIPO.INGRESO ? misCategoriasIngreso : misCategoriasGasto;

  // ---- gasto compartido ----
  const [cAmount, setCAmount] = useState("");
  const [cCategory, setCCategory] = useState("");
  const [cDesc, setCDesc] = useState("");
  const [cDate, setCDate] = useState(todayStr());
  const [cProps, setCProps] = useState({});
  const [cPagadoPor, setCPagadoPor] = useState(uid);
  useEffect(() => {
    setCProps((prev) => {
      const next = { ...prev };
      const n = personas.length || 1;
      personas.forEach((p) => { if (!(p.id in next)) next[p.id] = round2(100 / n); });
      return next;
    });
  }, [personas.length]);

  // ---- cuentas ----
  const [newAccName, setNewAccName] = useState("");
  const [newAccBalance, setNewAccBalance] = useState("");
  const [newAccTipo, setNewAccTipo] = useState("Banco/Efectivo");

  // ---- categorías ----
  const [newCatName, setNewCatName] = useState("");
  const [newCatType, setNewCatType] = useState(TIPO.GASTO);

  // ---- perfil ----
  const [perfilNombre, setPerfilNombre] = useState(miNombre);

  // ---- métricas ----
  const [metricsPreset, setMetricsPreset] = useState("mes_actual");
  const [metricsStart, setMetricsStart] = useState("");
  const [metricsEnd, setMetricsEnd] = useState("");
  const [selGasto, setSelGasto] = useState(null);
  const [selIngreso, setSelIngreso] = useState(null);
  const periodo = useMemo(() => getPeriodRange(metricsPreset, metricsStart, metricsEnd), [metricsPreset, metricsStart, metricsEnd]);
  useEffect(() => { setSelGasto(null); setSelIngreso(null); }, [periodo.start, periodo.end]);

  const balances = useMemo(() => {
    const b = {};
    misCuentas.forEach((a) => (b[a.id] = Number(a.saldoInicial) || 0));
    misTransacciones.forEach((t) => {
      const amt = Number(t.monto) || 0;
      if (t.tipo === TIPO.INGRESO) b[t.cuentaId] = (b[t.cuentaId] || 0) + amt;
      else if (t.tipo === TIPO.GASTO) b[t.cuentaId] = (b[t.cuentaId] || 0) - amt;
      else if (t.tipo === TIPO.TRANSFERENCIA) {
        b[t.cuentaId] = (b[t.cuentaId] || 0) - amt;
        b[t.cuentaDestinoId] = (b[t.cuentaDestinoId] || 0) + amt;
      }
    });
    return b;
  }, [misCuentas, misTransacciones]);
  const totalGeneral = useMemo(() => misCuentas.reduce((s, a) => s + (balances[a.id] || 0), 0), [misCuentas, balances]);

  const pendientesCategoria = useMemo(
    () => misTransacciones.filter((t) => t.tipo === TIPO.GASTO && !t.categoriaId),
    [misTransacciones]
  );

  // ---------- acciones: movimiento ----------
  async function handleAddTransaction(e) {
    e.preventDefault();
    setError("");
    const amt = Number(tAmount);
    if (!tAccount) return setError("Elegí una cuenta.");
    if (!amt || amt <= 0) return setError("El monto tiene que ser mayor a cero.");
    if (tType === TIPO.TRANSFERENCIA) {
      if (!tToAccount) return setError("Elegí a qué cuenta transferís.");
      if (tToAccount === tAccount) return setError("Origen y destino no pueden ser la misma cuenta.");
    } else if (!tCategory) return setError("Elegí una subcategoría.");
    try {
      await fb.addDoc(fb.collection(fb.db, "transacciones"), {
        tipo: tType, cuentaId: tAccount, personaId: uid, esCompartido: false,
        cuentaDestinoId: tType === TIPO.TRANSFERENCIA ? tToAccount : null,
        categoriaId: tType === TIPO.TRANSFERENCIA ? null : tCategory,
        monto: amt, descripcion: tDesc.trim(), fecha: tDate || todayStr(), creadoEnMs: Date.now(),
      });
      setTAmount(""); setTDesc(""); setTDate(todayStr()); setTCategory("");
    } catch { setError("No se pudo guardar (quedó pendiente si estás sin conexión)."); }
  }

  // ---------- acciones: gasto compartido ----------
  async function handleAddSharedExpense(e) {
    e.preventDefault();
    setError("");
    const total = Number(cAmount);
    if (!total || total <= 0) return setError("El monto total tiene que ser mayor a cero.");
    if (!cCategory) return setError("Elegí tu categoría (para tu parte).");
    if (!cPagadoPor) return setError("Elegí quién pagó.");
    const suma = personas.reduce((s, p) => s + (Number(cProps[p.id]) || 0), 0);
    if (Math.abs(suma - 100) > 0.5) return setError(`Los porcentajes suman ${suma}%, tienen que sumar 100%.`);
    for (const p of personas) {
      const prop = Number(cProps[p.id]) || 0;
      if (prop > 0 && !principalAccountOf(p.id)) return setError(`${personaName(p.id)} todavía no tiene una cuenta principal.`);
    }
    const compartidoId = uid ? `${uid}_${Date.now()}` : uid;
    const activos = personas.filter((p) => (Number(cProps[p.id]) || 0) > 0);
    let acumulado = 0;
    try {
      for (let idx = 0; idx < activos.length; idx++) {
        const p = activos[idx];
        const prop = Number(cProps[p.id]) || 0;
        let monto = idx === activos.length - 1 ? round2(total - acumulado) : round2((total * prop) / 100);
        acumulado = round2(acumulado + monto);
        const cuenta = principalAccountOf(p.id);
        await fb.addDoc(fb.collection(fb.db, "transacciones"), {
          tipo: TIPO.GASTO, cuentaId: cuenta.id, personaId: p.id, cuentaDestinoId: null,
          categoriaId: p.id === uid ? cCategory : null,
          monto, descripcion: cDesc.trim(), fecha: cDate || todayStr(),
          compartidoId, compartidoTotal: total, compartidoPorcentaje: prop, pagadoPor: cPagadoPor,
          esCompartido: true, creadoEnMs: Date.now(),
        });
      }
      setCAmount(""); setCDesc(""); setCDate(todayStr()); setCCategory("");
    } catch { setError("No se pudo guardar (quedó pendiente si estás sin conexión)."); }
  }

  async function handleAssignCategory(txId, categoriaId) {
    try { await fb.updateDoc(fb.doc(fb.db, "transacciones", txId), { categoriaId }); } catch { setError("No se pudo asignar la categoría."); }
  }
  async function handleCreateAndAssignCategory(txId, nombre) {
    try {
      const ref = await fb.addDoc(fb.collection(fb.db, "categorias"), { nombre, tipo: TIPO.GASTO, personaId: uid });
      await fb.updateDoc(fb.doc(fb.db, "transacciones", txId), { categoriaId: ref.id });
    } catch { setError("No se pudo crear la categoría."); }
  }

  // ---------- cuentas ----------
  async function handleAddAccount(e) {
    e.preventDefault();
    setError("");
    if (!newAccName.trim()) return setError("Ponele un nombre a la cuenta.");
    const yaTienePrincipal = misCuentas.some((a) => a.esPrincipal);
    try {
      await fb.addDoc(fb.collection(fb.db, "cuentas"), {
        nombre: newAccName.trim(), personaId: uid, esPrincipal: !yaTienePrincipal,
        saldoInicial: Number(newAccBalance) || 0, tipo: newAccTipo.trim() || "Banco/Efectivo",
      });
      setNewAccName(""); setNewAccBalance("");
    } catch { setError("No se pudo guardar (quedó pendiente si estás sin conexión)."); }
  }
  async function handleSetPrincipal(id) {
    const batch = fb.writeBatch(fb.db);
    misCuentas.forEach((a) => batch.update(fb.doc(fb.db, "cuentas", a.id), { esPrincipal: a.id === id }));
    try { await batch.commit(); } catch { setError("No se pudo actualizar (quedó pendiente si estás sin conexión)."); }
  }
  async function handleDeleteAccount(id) {
    const enUso = misTransacciones.some((t) => t.cuentaId === id || t.cuentaDestinoId === id);
    if (enUso) return setError("No se puede borrar: tiene movimientos asociados.");
    try { await fb.deleteDoc(fb.doc(fb.db, "cuentas", id)); } catch { setError("No se pudo borrar."); }
  }

  // ---------- categorías ----------
  async function handleAddCategory(e) {
    e.preventDefault();
    setError("");
    if (!newCatName.trim()) return setError("Ponele un nombre a la categoría.");
    try {
      await fb.addDoc(fb.collection(fb.db, "categorias"), { nombre: newCatName.trim(), tipo: newCatType, personaId: uid });
      setNewCatName("");
    } catch { setError("No se pudo guardar (quedó pendiente si estás sin conexión)."); }
  }
  async function handleDeleteCategory(id) {
    const enUso = misTransacciones.some((t) => t.categoriaId === id);
    if (enUso) return setError("No se puede borrar: tiene movimientos asociados.");
    try { await fb.deleteDoc(fb.doc(fb.db, "categorias", id)); } catch { setError("No se pudo borrar."); }
  }

  async function handleDeleteTransaction(id) {
    const tx = misTransacciones.find((t) => t.id === id) || compartidas.find((t) => t.id === id);
    try {
      if (tx && tx.compartidoId) {
        const grupo = compartidas.filter((t) => t.compartidoId === tx.compartidoId);
        const batch = fb.writeBatch(fb.db);
        grupo.forEach((t) => batch.delete(fb.doc(fb.db, "transacciones", t.id)));
        await batch.commit();
      } else {
        await fb.deleteDoc(fb.doc(fb.db, "transacciones", id));
      }
    } catch { setError("No se pudo borrar."); }
  }

  async function handleGuardarPerfil(e) {
    e.preventDefault();
    if (!perfilNombre.trim()) return;
    try { await fb.setDoc(fb.doc(fb.db, "personas", uid), { nombre: perfilNombre.trim() }); } catch { setError("No se pudo guardar."); }
  }

  const historialFiltrado = useMemo(() => {
    let list = [...misTransacciones];
    if (filterAccount !== "todas") list = list.filter((t) => t.cuentaId === filterAccount || t.cuentaDestinoId === filterAccount);
    return list.sort((a, b) => (a.fecha < b.fecha ? 1 : a.fecha > b.fecha ? -1 : 0));
  }, [misTransacciones, filterAccount]);

  const sumaCProps = personas.reduce((s, p) => s + (Number(cProps[p.id]) || 0), 0);

  // ---------- métricas ----------
  const txsPeriodo = useMemo(() => misTransacciones.filter((t) => t.tipo !== TIPO.TRANSFERENCIA && t.fecha >= periodo.start && t.fecha <= periodo.end), [misTransacciones, periodo]);
  function agruparPorCategoria(lista, tipo) {
    const map = {};
    lista.filter((t) => t.tipo === tipo).forEach((t) => {
      const key = t.categoriaId || "sin_categoria";
      if (!map[key]) map[key] = { id: key, label: t.categoriaId ? categoryName(t.categoriaId) : "Sin categoría", value: 0, items: [] };
      map[key].value = round2(map[key].value + Number(t.monto));
      map[key].items.push(t);
    });
    return Object.values(map).sort((a, b) => b.value - a.value);
  }
  const gastosPorCategoria = useMemo(() => agruparPorCategoria(txsPeriodo, TIPO.GASTO), [txsPeriodo, misCategorias]);
  const ingresosPorCategoria = useMemo(() => agruparPorCategoria(txsPeriodo, TIPO.INGRESO), [txsPeriodo, misCategorias]);
  const detalleGasto = gastosPorCategoria.find((c) => c.id === selGasto);
  const detalleIngreso = ingresosPorCategoria.find((c) => c.id === selIngreso);

  const ahorro = useMemo(() => {
    const cuentasAhorro = misCuentas.filter((a) => !a.esPrincipal);
    let total = 0;
    const porTipo = {};
    cuentasAhorro.forEach((a) => {
      let delta = 0;
      misTransacciones.forEach((t) => {
        if (t.fecha < periodo.start || t.fecha > periodo.end) return;
        if (t.tipo === TIPO.INGRESO && t.cuentaId === a.id) delta += Number(t.monto);
        else if (t.tipo === TIPO.GASTO && t.cuentaId === a.id) delta -= Number(t.monto);
        else if (t.tipo === TIPO.TRANSFERENCIA) {
          if (t.cuentaId === a.id) delta -= Number(t.monto);
          if (t.cuentaDestinoId === a.id) delta += Number(t.monto);
        }
      });
      delta = round2(delta);
      total = round2(total + delta);
      const tipo = a.tipo || "Sin tipo";
      porTipo[tipo] = round2((porTipo[tipo] || 0) + delta);
    });
    const ingresosPeriodo = round2(
      misTransacciones.filter((t) => t.tipo === TIPO.INGRESO && t.fecha >= periodo.start && t.fecha <= periodo.end).reduce((s, t) => s + Number(t.monto), 0)
    );
    return { total, porTipo, ingresosPeriodo, pct: ingresosPeriodo > 0 ? round2((total / ingresosPeriodo) * 100) : null };
  }, [misCuentas, misTransacciones, periodo]);

  // ---------- análisis mensual (gastos e ingresos por mes) ----------
  const analisisMensual = useMemo(() => {
    const map = {};
    misTransacciones.forEach((t) => {
      if (t.tipo !== TIPO.GASTO && t.tipo !== TIPO.INGRESO) return;
      const mes = (t.fecha || "").slice(0, 7);
      if (!mes) return;
      if (!map[mes]) map[mes] = { mes, gasto: 0, ingreso: 0 };
      map[mes][t.tipo === TIPO.GASTO ? "gasto" : "ingreso"] = round2(map[mes][t.tipo === TIPO.GASTO ? "gasto" : "ingreso"] + Number(t.monto));
    });
    return Object.values(map).sort((a, b) => (a.mes < b.mes ? -1 : 1));
  }, [misTransacciones]);

  // ---------- rendimiento de inversiones (cuentas no principales) ----------
  // Criterio: las TRANSFERENCIAS hacia/desde la cuenta son aportes o retiros de
  // capital (no generan rendimiento, solo cambian la base). Los movimientos de
  // tipo ingreso/gasto cargados directamente en la cuenta representan la
  // ganancia o pérdida real del período, y se componen entre sí para armar un
  // índice comparable entre cuentas independientemente de cuánto capital tengan.
  const inversiones = useMemo(() => {
    const cuentasInv = misCuentas.filter((a) => !a.esPrincipal);
    const series = cuentasInv.map((a) => {
      const movs = misTransacciones
        .filter((t) => t.cuentaId === a.id || t.cuentaDestinoId === a.id)
        .slice()
        .sort((x, y) => (x.fecha < y.fecha ? -1 : 1));
      let saldo = Number(a.saldoInicial) || 0;
      let gananciaAcumulada = 0;
      let indice = 100;
      let huboEventoSinBase = false;
      const puntos = [{ fecha: "inicio", saldo, gananciaAcumulada, indice }];
      movs.forEach((t) => {
        if (t.tipo === TIPO.TRANSFERENCIA) {
          // Aporte o retiro de capital: mueve el saldo, no es rendimiento.
          if (t.cuentaId === a.id) saldo -= Number(t.monto);
          if (t.cuentaDestinoId === a.id) saldo += Number(t.monto);
        } else if (t.tipo === TIPO.INGRESO || t.tipo === TIPO.GASTO) {
          // Ajuste de fin de período: ganancia o pérdida real generada por la inversión.
          const monto = Number(t.monto) * (t.tipo === TIPO.GASTO ? -1 : 1);
          const saldoAntes = saldo;
          saldo += monto;
          gananciaAcumulada = round2(gananciaAcumulada + monto);
          if (saldoAntes > 0) indice = round2(indice * (1 + monto / saldoAntes));
          else huboEventoSinBase = true;
        }
        saldo = round2(saldo);
        puntos.push({ fecha: t.fecha, saldo, gananciaAcumulada, indice });
      });
      const inicial = Number(a.saldoInicial) || 0;
      const actual = balances[a.id] || 0;
      const rendimientoPct = round2(indice - 100);
      const primeraFecha = movs.length ? movs[0].fecha : null;
      let dias = null, cagr = null;
      if (primeraFecha) {
        dias = Math.round((new Date(todayStr()) - new Date(primeraFecha)) / 86400000);
        if (dias >= 30 && indice > 0) cagr = round2((Math.pow(indice / 100, 365 / dias) - 1) * 100);
      }
      return { id: a.id, nombre: a.nombre, tipo: a.tipo, inicial, actual, gananciaNeta: gananciaAcumulada, rendimientoPct, cagr, dias, huboEventoSinBase, puntos };
    });
    const fechasSet = new Set(["inicio"]);
    series.forEach((s) => s.puntos.forEach((p) => fechasSet.add(p.fecha)));
    const fechas = Array.from(fechasSet).sort((a, b) => (a === "inicio" ? -1 : b === "inicio" ? 1 : a < b ? -1 : 1));
    const seriesAlineadas = series.map((s) => {
      const porFecha = {};
      s.puntos.forEach((p) => { porFecha[p.fecha] = p; });
      let ultimo = s.puntos[0];
      let empezo = false;
      const valores = [], pctValores = [];
      fechas.forEach((f) => {
        if (!empezo) {
          if (f !== s.primeraFecha) { valores.push(null); pctValores.push(null); return; }
          empezo = true;
        }
        if (f in porFecha) ultimo = porFecha[f];
        valores.push(ultimo.gananciaAcumulada);
        pctValores.push(ultimo.indice - 100);
      });
      return { ...s, valores, pctValores };
    });
    return { cuentas: seriesAlineadas, fechas };
  }, [misCuentas, misTransacciones, balances]);

  // ---------- deudas ----------
  const ultimaLiquidacion = useMemo(() => {
    if (!liquidaciones.length) return null;
    return liquidaciones.slice().sort((a, b) => (b.creadoEnMs || 0) - (a.creadoEnMs || 0))[0];
  }, [liquidaciones]);

  const gruposPendientes = useMemo(() => {
    const cutoff = ultimaLiquidacion?.creadoEnMs || 0;
    const relevant = compartidas.filter((t) => (t.creadoEnMs || 0) > cutoff);
    const groups = {};
    relevant.forEach((t) => { (groups[t.compartidoId] = groups[t.compartidoId] || []).push(t); });
    return Object.values(groups).map((g) => ({
      compartidoId: g[0].compartidoId, fecha: g[0].fecha, descripcion: g[0].descripcion,
      total: g[0].compartidoTotal, pagadoPor: g[0].pagadoPor, items: g,
    })).sort((a, b) => (a.fecha < b.fecha ? 1 : -1));
  }, [compartidas, ultimaLiquidacion]);

  const debeA = useMemo(() => {
    const result = {};
    gruposPendientes.forEach((g) => {
      if (!g.pagadoPor) return;
      g.items.forEach((t) => {
        const deudor = t.personaId;
        if (!deudor || deudor === g.pagadoPor) return;
        result[deudor] = result[deudor] || {};
        result[deudor][g.pagadoPor] = round2((result[deudor][g.pagadoPor] || 0) + Number(t.monto));
      });
    });
    return result;
  }, [gruposPendientes]);

  const paresDeuda = useMemo(() => {
    const seen = new Set();
    const out = [];
    personas.forEach((p1) => personas.forEach((p2) => {
      if (p1.id === p2.id) return;
      const key = [p1.id, p2.id].sort().join("|");
      if (seen.has(key)) return;
      seen.add(key);
      const a = debeA[p1.id]?.[p2.id] || 0;
      const b = debeA[p2.id]?.[p1.id] || 0;
      const net = round2(a - b);
      if (Math.abs(net) < 0.01) return;
      out.push(net > 0 ? { deudorId: p1.id, acreedorId: p2.id, monto: net } : { deudorId: p2.id, acreedorId: p1.id, monto: -net });
    }));
    return out;
  }, [debeA, personas]);

  async function handleSaldarDeudas() {
    if (!paresDeuda.length) return;
    if (!window.confirm("Esto no mueve plata en ninguna cuenta, solo reinicia el conteo de deudas. ¿Confirmás que ya se saldó afuera de la app?")) return;
    try {
      await fb.addDoc(fb.collection(fb.db, "liquidaciones"), {
        creadoEnMs: Date.now(),
        detalle: paresDeuda.map((p) => ({ deudorId: p.deudorId, acreedorId: p.acreedorId, monto: p.monto })),
      });
    } catch { setError("No se pudo registrar (quedó pendiente si estás sin conexión)."); }
  }

  const miDeuda = paresDeuda.find((p) => p.deudorId === uid || p.acreedorId === uid);

  const CATEGORIES = [
    { id: "metricas", label: "Métricas", subtabs: [
      { id: "metricas", label: "General" },
      { id: "mensual", label: "Por mes" },
      { id: "inversiones", label: "Inversiones" },
      { id: "resumen", label: "Resumen" },
      { id: "deudas", label: "Deudas" },
    ] },
    { id: "movimiento", label: "Movimiento", subtabs: [
      { id: "movimiento", label: "Nuevo movimiento" },
      { id: "compartido", label: "Gasto compartido" },
      { id: "eventos", label: "Eventos" },
      { id: "historial", label: "Historial" },
    ] },
    { id: "gestion", label: "Gestión", subtabs: [
      { id: "cuentas", label: "Cuentas" },
      { id: "categorias", label: "Categorías" },
      { id: "perfil", label: "Perfil" },
    ] },
  ];
  const currentCategory = CATEGORIES.find((c) => c.id === category) || CATEGORIES[0];

  function handleSwitchCategory(catId) {
    setCategory(catId);
    setTab(lastSubtab[catId] || CATEGORIES.find((c) => c.id === catId).subtabs[0].id);
  }
  function handleSwitchSubtab(subId) {
    setTab(subId);
    setLastSubtab((prev) => ({ ...prev, [category]: subId }));
  }

  return (
    <div className="min-h-screen bg-slate-50 text-slate-900 pb-10">
      <div className="max-w-3xl mx-auto px-4 pb-6" style={{ paddingTop: "max(1.5rem, calc(env(safe-area-inset-top) + 0.9rem))" }}>
        <header className="mb-5 flex items-start justify-between gap-3">
          <div>
            <h1 className="text-xl font-semibold flex items-center gap-2"><Icon name="wallet" size={20} className="text-slate-700" />Mis finanzas</h1>
            <p className="text-sm text-slate-500 mt-1">Hola, {miNombre}.</p>
          </div>
          <button onClick={() => fb.signOut(fb.auth)} className="text-slate-400 hover:text-slate-700 shrink-0 mt-1" title="Cerrar sesión"><Icon name="logout" size={18} /></button>
        </header>

        {!online && (
          <div className="mb-4 flex items-center gap-2 rounded-md border border-amber-200 bg-amber-50 text-amber-700 text-sm px-3 py-2">
            <Icon name="cloudOff" size={15} className="shrink-0" />Sin conexión. Lo que cargues se guarda igual y se sincroniza solo cuando vuelva internet.
          </div>
        )}
        {online && hasPending && (
          <div className="mb-4 flex items-center gap-2 rounded-md border border-blue-200 bg-blue-50 text-blue-700 text-sm px-3 py-2">
            <Icon name="cloudSync" size={15} className="shrink-0" />Sincronizando cambios pendientes...
          </div>
        )}
        {error && (
          <div className="mb-4 flex items-start justify-between gap-2 rounded-md border border-red-200 bg-red-50 text-red-700 text-sm px-3 py-2">
            <span>{error}</span>
            <button onClick={() => setError("")} className="text-red-400 hover:text-red-600 shrink-0"><Icon name="x" size={14} /></button>
          </div>
        )}

        <nav className="flex gap-1 mb-5 border-b border-slate-200">
          {CATEGORIES.map((c) => (
            <button key={c.id} onClick={() => handleSwitchCategory(c.id)}
              className={`flex-1 px-3 py-2 text-sm font-medium border-b-2 -mb-px whitespace-nowrap transition-colors ${category === c.id ? "border-slate-900 text-slate-900" : "border-transparent text-slate-500 hover:text-slate-700"}`}>
              {c.label}
            </button>
          ))}
        </nav>

        <SwipeViews views={currentCategory.subtabs} activeId={tab} onChange={handleSwitchSubtab}>

        {tab === "resumen" && (
          <div className="space-y-4">
            {pendientesCategoria.length > 0 && (
              <div className="rounded-lg border border-amber-200 bg-amber-50 p-3 flex items-start gap-2 text-sm text-amber-800">
                <Icon name="alert" size={16} className="shrink-0 mt-0.5" />
                <span>Tenés {pendientesCategoria.length} gasto{pendientesCategoria.length > 1 ? "s" : ""} sin categorizar (compartidos o de eventos). Elegí tu categoría en la lista de abajo.</span>
              </div>
            )}
            {miDeuda && (
              <div className="rounded-lg border border-slate-200 bg-white p-3 text-sm">
                {miDeuda.deudorId === uid
                  ? <span>Le debés a <b>{personaName(miDeuda.acreedorId)}</b>: <b>{formatMoney(miDeuda.monto)}</b></span>
                  : <span><b>{personaName(miDeuda.deudorId)}</b> te debe: <b>{formatMoney(miDeuda.monto)}</b></span>}
                {" "}<button onClick={() => handleSwitchSubtab("deudas")} className="text-slate-500 underline">Ver</button>
              </div>
            )}

            <div className="rounded-lg border border-slate-200 bg-white p-4">
              <div className="text-xs uppercase tracking-wide text-slate-500">Total en tus cuentas</div>
              <div className="text-2xl font-semibold mt-1">{formatMoney(totalGeneral)}</div>
            </div>

            <div className="grid gap-3 sm:grid-cols-2">
              {misCuentas.map((a) => (
                <div key={a.id} className="rounded-lg border border-slate-200 bg-white p-4">
                  <div className="flex items-center gap-1.5 font-medium text-sm flex-wrap">
                    {a.esPrincipal && <Icon name="star" size={13} className="text-amber-500 fill-amber-500" />}
                    {a.nombre}
                    {a.tipo && <span className="text-[10px] uppercase tracking-wide bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded">{a.tipo}</span>}
                  </div>
                  <div className="text-lg font-semibold mt-2">{formatMoney(balances[a.id])}</div>
                </div>
              ))}
              {misCuentas.length === 0 && <p className="text-sm text-slate-400 sm:col-span-2">Todavía no tenés cuentas. Andá a la pestaña "Cuentas" para crear la primera.</p>}
            </div>

            <div>
              <div className="text-sm font-medium text-slate-700 mb-2">Últimos movimientos</div>
              <TransactionList items={misTransacciones.slice().sort((a, b) => (a.fecha < b.fecha ? 1 : -1)).slice(0, 6)}
                accountName={accountName} personaName={personaName} categoryName={categoryName} onDelete={handleDeleteTransaction}
                misCategoriasGasto={misCategoriasGasto} onAssign={handleAssignCategory} onCreateAndAssign={handleCreateAndAssignCategory} />
              {misTransacciones.length === 0 && <p className="text-sm text-slate-400">Todavía no cargaste ningún movimiento.</p>}
            </div>
          </div>
        )}

        {tab === "movimiento" && (
          <form onSubmit={handleAddTransaction} className="rounded-lg border border-slate-200 bg-white p-4 space-y-4">
            <div className="flex gap-2">
              {[{ id: TIPO.GASTO, label: "Gasto", icon: "down" }, { id: TIPO.INGRESO, label: "Ingreso", icon: "up" }, { id: TIPO.TRANSFERENCIA, label: "Transferencia", icon: "swap" }].map(({ id, label, icon }) => (
                <button type="button" key={id} onClick={() => { setTType(id); setTCategory(""); }}
                  className={`flex-1 flex items-center justify-center gap-1.5 rounded-md border px-3 py-2 text-sm font-medium ${tType === id ? "border-slate-900 bg-slate-900 text-white" : "border-slate-200 text-slate-600 hover:border-slate-300"}`}>
                  <Icon name={icon} size={14} />{label}
                </button>
              ))}
            </div>
            <div className="grid gap-3 sm:grid-cols-2">
              <div>
                <label className="block text-xs font-medium text-slate-500 mb-1">{tType === TIPO.TRANSFERENCIA ? "Desde la cuenta" : "Cuenta"}</label>
                <select value={tAccount} onChange={(e) => setTAccount(e.target.value)} className="w-full rounded-md border border-slate-200 px-3 py-2 text-sm">
                  {misCuentas.map((a) => <option key={a.id} value={a.id}>{a.nombre}</option>)}
                </select>
              </div>
              {tType === TIPO.TRANSFERENCIA ? (
                <div>
                  <label className="block text-xs font-medium text-slate-500 mb-1">Hacia la cuenta</label>
                  <select value={tToAccount} onChange={(e) => setTToAccount(e.target.value)} className="w-full rounded-md border border-slate-200 px-3 py-2 text-sm">
                    <option value="">Elegir...</option>
                    {misCuentas.filter((a) => a.id !== tAccount).map((a) => <option key={a.id} value={a.id}>{a.nombre}</option>)}
                  </select>
                </div>
              ) : (
                <div>
                  <label className="block text-xs font-medium text-slate-500 mb-1">Subcategoría</label>
                  <select value={tCategory} onChange={(e) => setTCategory(e.target.value)} className="w-full rounded-md border border-slate-200 px-3 py-2 text-sm">
                    <option value="">Elegir...</option>
                    {categoriasFiltradas.map((c) => <option key={c.id} value={c.id}>{c.nombre}</option>)}
                  </select>
                </div>
              )}
              <div>
                <label className="block text-xs font-medium text-slate-500 mb-1">Monto</label>
                <input type="number" step="0.01" min="0" value={tAmount} onChange={(e) => setTAmount(e.target.value)} placeholder="0.00" className="w-full rounded-md border border-slate-200 px-3 py-2 text-sm" />
              </div>
              <div>
                <label className="block text-xs font-medium text-slate-500 mb-1">Fecha</label>
                <input type="date" value={tDate} onChange={(e) => setTDate(e.target.value)} className="w-full rounded-md border border-slate-200 px-3 py-2 text-sm" />
              </div>
              <div className="sm:col-span-2">
                <label className="block text-xs font-medium text-slate-500 mb-1">Descripción (opcional)</label>
                <input type="text" value={tDesc} onChange={(e) => setTDesc(e.target.value)} placeholder="Ej: supermercado, alquiler..." className="w-full rounded-md border border-slate-200 px-3 py-2 text-sm" />
              </div>
            </div>
            <button type="submit" className="w-full sm:w-auto flex items-center justify-center gap-1.5 rounded-md bg-slate-900 text-white px-4 py-2 text-sm font-medium hover:bg-slate-800"><Icon name="plus" size={14} />Guardar movimiento</button>
          </form>
        )}

        {tab === "compartido" && (
          <form onSubmit={handleAddSharedExpense} className="rounded-lg border border-slate-200 bg-white p-4 space-y-4">
            <div className="flex items-center gap-2 text-sm font-medium text-slate-700"><Icon name="users" size={16} />Nuevo gasto compartido</div>
            <p className="text-xs text-slate-500 -mt-2">Se carga en la cuenta principal de cada persona. La categoría de las otras personas la eligen ellas después.</p>

            <div className="grid gap-3 sm:grid-cols-2">
              <div>
                <label className="block text-xs font-medium text-slate-500 mb-1">Monto total</label>
                <input type="number" step="0.01" min="0" value={cAmount} onChange={(e) => setCAmount(e.target.value)} placeholder="0.00" className="w-full rounded-md border border-slate-200 px-3 py-2 text-sm" />
              </div>
              <div>
                <label className="block text-xs font-medium text-slate-500 mb-1">Tu categoría (para tu parte)</label>
                <select value={cCategory} onChange={(e) => setCCategory(e.target.value)} className="w-full rounded-md border border-slate-200 px-3 py-2 text-sm">
                  <option value="">Elegir...</option>
                  {misCategoriasGasto.map((c) => <option key={c.id} value={c.id}>{c.nombre}</option>)}
                </select>
              </div>
              <div>
                <label className="block text-xs font-medium text-slate-500 mb-1">Fecha</label>
                <input type="date" value={cDate} onChange={(e) => setCDate(e.target.value)} className="w-full rounded-md border border-slate-200 px-3 py-2 text-sm" />
              </div>
              <div>
                <label className="block text-xs font-medium text-slate-500 mb-1">¿Quién pagó?</label>
                <select value={cPagadoPor} onChange={(e) => setCPagadoPor(e.target.value)} className="w-full rounded-md border border-slate-200 px-3 py-2 text-sm">
                  {personas.map((p) => <option key={p.id} value={p.id}>{personaName(p.id)}</option>)}
                </select>
              </div>
              <div className="sm:col-span-2">
                <label className="block text-xs font-medium text-slate-500 mb-1">Descripción (opcional)</label>
                <input type="text" value={cDesc} onChange={(e) => setCDesc(e.target.value)} placeholder="Ej: supermercado del mes" className="w-full rounded-md border border-slate-200 px-3 py-2 text-sm" />
              </div>
            </div>

            <div className="border-t border-slate-100 pt-3">
              <div className="text-xs font-medium text-slate-500 mb-2">División (por defecto en partes iguales, ajustable para este gasto puntual)</div>
              <div className="space-y-2">
                {personas.map((p) => (
                  <div key={p.id} className="flex items-center gap-3">
                    <span className="text-sm w-32 truncate">{personaName(p.id)}</span>
                    <input type="number" min="0" max="100" value={cProps[p.id] ?? 0} onChange={(e) => setCProps({ ...cProps, [p.id]: e.target.value })} className="w-20 rounded-md border border-slate-200 px-2 py-1.5 text-sm" />
                    <span className="text-sm text-slate-400">%</span>
                    {cAmount && <span className="text-xs text-slate-400 ml-auto">≈ {formatMoney((Number(cAmount) * (Number(cProps[p.id]) || 0)) / 100)}</span>}
                  </div>
                ))}
              </div>
              <div className={`text-xs mt-2 ${Math.abs(sumaCProps - 100) > 0.5 ? "text-red-500" : "text-slate-400"}`}>Total: {sumaCProps}% {Math.abs(sumaCProps - 100) > 0.5 ? "(tiene que sumar 100%)" : ""}</div>
            </div>

            <button type="submit" className="w-full sm:w-auto flex items-center justify-center gap-1.5 rounded-md bg-slate-900 text-white px-4 py-2 text-sm font-medium hover:bg-slate-800"><Icon name="plus" size={14} />Registrar gasto compartido</button>
          </form>
        )}

        {tab === "deudas" && (
          <div className="space-y-4">
            <div className="rounded-lg border border-slate-200 bg-white p-4">
              <div className="flex items-center gap-2 text-sm font-medium text-slate-700 mb-3"><Icon name="scale" size={16} />Balance de gastos compartidos</div>
              {paresDeuda.length === 0 ? (
                <p className="text-sm text-slate-500">No hay deudas pendientes. Todo saldado 🎉</p>
              ) : (
                <div className="space-y-2">
                  {paresDeuda.map((p, i) => (
                    <div key={i} className="text-sm">
                      <span className="font-medium">{personaName(p.deudorId)}</span> le debe a <span className="font-medium">{personaName(p.acreedorId)}</span>: <span className="font-semibold">{formatMoney(p.monto)}</span>
                    </div>
                  ))}
                </div>
              )}
              {paresDeuda.length > 0 && (
                <button onClick={handleSaldarDeudas} className="mt-4 flex items-center gap-1.5 rounded-md bg-slate-900 text-white px-4 py-2 text-sm font-medium hover:bg-slate-800"><Icon name="scale" size={14} />Saldar deudas</button>
              )}
              {ultimaLiquidacion && <p className="text-xs text-slate-400 mt-3">Última liquidación: {new Date(ultimaLiquidacion.creadoEnMs).toLocaleDateString("es-AR")}</p>}
            </div>

            <div>
              <div className="text-sm font-medium text-slate-700 mb-2">Gastos compartidos desde la última liquidación</div>
              {gruposPendientes.length === 0 ? <p className="text-sm text-slate-400">No hay gastos compartidos en este período.</p> : (
                <div className="rounded-lg border border-slate-200 bg-white divide-y divide-slate-100">
                  {gruposPendientes.map((g) => (
                    <div key={g.compartidoId} className="px-4 py-3">
                      <div className="flex items-center justify-between text-sm">
                        <span className="font-medium">{g.descripcion || "Gasto compartido"}</span>
                        <span className="font-semibold">{formatMoney(g.total)}</span>
                      </div>
                      <div className="text-xs text-slate-400 mt-0.5">
                        {g.fecha} · Pagó {personaName(g.pagadoPor)} · {g.items.map((it) => `${personaName(it.personaId)}: ${formatMoney(it.monto)}`).join(" · ")}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {tab === "metricas" && (
          <div className="space-y-4">
            <div className="rounded-lg border border-slate-200 bg-white p-4 space-y-3">
              <div className="flex flex-wrap gap-2">
                {[{ id: "mes_actual", label: "Este mes" }, { id: "mes_pasado", label: "Mes pasado" }, { id: "ultimos_3", label: "Últimos 3 meses" }, { id: "anio_actual", label: "Año actual" }, { id: "personalizado", label: "Personalizado" }].map((opt) => (
                  <button key={opt.id} onClick={() => setMetricsPreset(opt.id)} className={`px-3 py-1.5 rounded-md text-xs font-medium border ${metricsPreset === opt.id ? "border-slate-900 bg-slate-900 text-white" : "border-slate-200 text-slate-600"}`}>{opt.label}</button>
                ))}
              </div>
              {metricsPreset === "personalizado" && (
                <div className="flex items-center gap-2">
                  <input type="date" value={metricsStart} onChange={(e) => setMetricsStart(e.target.value)} className="rounded-md border border-slate-200 px-2 py-1.5 text-sm" />
                  <span className="text-slate-400 text-sm">a</span>
                  <input type="date" value={metricsEnd} onChange={(e) => setMetricsEnd(e.target.value)} className="rounded-md border border-slate-200 px-2 py-1.5 text-sm" />
                </div>
              )}
              <div className="text-xs text-slate-400">Período: {periodo.start} a {periodo.end}</div>
            </div>

            <div className="grid gap-4 sm:grid-cols-2">
              <div>
                <PieChartCard title="Gastos por categoría" data={gastosPorCategoria} onSelectSlice={setSelGasto} />
                {detalleGasto && (
                  <div className="mt-2 rounded-lg border border-slate-200 bg-white divide-y divide-slate-100">
                    <div className="px-4 py-2 text-xs font-medium text-slate-600 flex justify-between"><span>{detalleGasto.label}</span><span>{formatMoney(detalleGasto.value)}</span></div>
                    {detalleGasto.items.sort((a, b) => (a.fecha < b.fecha ? 1 : -1)).map((t) => (
                      <div key={t.id} className="px-4 py-2 text-xs flex justify-between text-slate-500"><span>{t.fecha} {t.descripcion ? `· ${t.descripcion}` : ""}</span><span>{formatMoney(t.monto)}</span></div>
                    ))}
                  </div>
                )}
              </div>
              <div>
                <PieChartCard title="Ingresos por categoría" data={ingresosPorCategoria} onSelectSlice={setSelIngreso} />
                {detalleIngreso && (
                  <div className="mt-2 rounded-lg border border-slate-200 bg-white divide-y divide-slate-100">
                    <div className="px-4 py-2 text-xs font-medium text-slate-600 flex justify-between"><span>{detalleIngreso.label}</span><span>{formatMoney(detalleIngreso.value)}</span></div>
                    {detalleIngreso.items.sort((a, b) => (a.fecha < b.fecha ? 1 : -1)).map((t) => (
                      <div key={t.id} className="px-4 py-2 text-xs flex justify-between text-slate-500"><span>{t.fecha} {t.descripcion ? `· ${t.descripcion}` : ""}</span><span>{formatMoney(t.monto)}</span></div>
                    ))}
                  </div>
                )}
              </div>
            </div>

            <div>
