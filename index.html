              <div className="text-sm font-medium text-slate-700 mb-2 flex items-center gap-1.5"><Icon name="chart" size={15} />Ahorro del período</div>
              <div className="rounded-lg border border-slate-200 bg-white p-4">
                <div className="flex items-center justify-between text-sm font-medium">
                  <span>Total ahorrado</span>
                  <span>{formatMoney(ahorro.total)} {ahorro.pct !== null && <span className="text-slate-400 font-normal">({ahorro.pct}% de ingresos)</span>}</span>
                </div>
                <div className="text-xs text-slate-400 mt-1">Ingresos del período: {formatMoney(ahorro.ingresosPeriodo)}</div>
                {Object.keys(ahorro.porTipo).length > 0 ? (
                  <div className="mt-3 space-y-1.5">
                    {Object.entries(ahorro.porTipo).map(([tipoNombre, monto]) => {
                      const maxAbs = Math.max(1, ...Object.values(ahorro.porTipo).map(Math.abs));
                      return (
                        <div key={tipoNombre} className="flex items-center gap-2 text-xs">
                          <span className="w-28 truncate text-slate-500">{tipoNombre}</span>
                          <div className="flex-1 h-2 bg-slate-100 rounded overflow-hidden"><div className={`h-full ${monto >= 0 ? "bg-emerald-500" : "bg-red-400"}`} style={{ width: `${Math.min(100, (Math.abs(monto) / maxAbs) * 100)}%` }}></div></div>
                          <span className="w-24 text-right font-medium">{formatMoney(monto)}</span>
                        </div>
                      );
                    })}
                  </div>
                ) : <p className="text-xs text-slate-400 mt-2">Sin cuentas de ahorro/inversión todavía.</p>}
              </div>
            </div>
          </div>
        )}

        {tab === "mensual" && (
          <div className="space-y-4">
            <LineChartCard
              title="Gastos e ingresos por mes"
              labels={analisisMensual.map((m) => m.mes)}
              datasets={[
                { label: "Gastos", data: analisisMensual.map((m) => m.gasto) },
                { label: "Ingresos", data: analisisMensual.map((m) => m.ingreso) },
              ]}
              empty={analisisMensual.length < 2}
              yFormatter={(v) => formatMoney(v)}
            />
            {analisisMensual.length < 2 && (
              <p className="text-sm text-slate-400">Todavía no hay suficiente historial (se necesitan movimientos de al menos 2 meses distintos) para armar esta comparación.</p>
            )}
            {analisisMensual.length >= 2 && (
              <div className="rounded-lg border border-slate-200 bg-white divide-y divide-slate-100">
                {analisisMensual.slice().reverse().map((m) => (
                  <div key={m.mes} className="flex items-center justify-between px-4 py-2 text-sm">
                    <span className="text-slate-500">{m.mes}</span>
                    <span className="text-emerald-600">+{formatMoney(m.ingreso)}</span>
                    <span className="text-red-600">-{formatMoney(m.gasto)}</span>
                    <span className="font-medium">{formatMoney(round2(m.ingreso - m.gasto))}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {tab === "inversiones" && (
          <div className="space-y-4">
            {inversiones.cuentas.length === 0 ? (
              <p className="text-sm text-slate-400">Todavía no tenés cuentas de inversión/ahorro (cualquier cuenta que no sea tu cuenta principal cuenta acá).</p>
            ) : (
              <>
                <LineChartCard
                  title="Ganancia/pérdida acumulada (monto, $)"
                  labels={inversiones.fechas.map((f) => (f === "inicio" ? "Inicio" : f))}
                  datasets={inversiones.cuentas.map((c) => ({ label: c.nombre, data: c.valores }))}
                  empty={inversiones.fechas.length < 2}
                  yFormatter={(v) => formatMoney(v)}
                />
                <LineChartCard
                  title="Rendimiento compuesto (%)"
                  labels={inversiones.fechas.map((f) => (f === "inicio" ? "Inicio" : f))}
                  datasets={inversiones.cuentas.map((c) => ({ label: c.nombre, data: c.pctValores }))}
                  empty={inversiones.fechas.length < 2}
                  yFormatter={(v) => `${v}%`}
                />
                <div className="rounded-lg border border-slate-200 bg-white divide-y divide-slate-100">
                  <div className="px-4 py-2 text-xs font-medium text-slate-500 flex justify-between">
                    <span className="w-1/4">Cuenta</span><span className="w-1/4 text-right">Ganancia neta</span><span className="w-1/4 text-right">Total período</span><span className="w-1/4 text-right">Anualizado</span>
                  </div>
                  {inversiones.cuentas.map((c) => (
                    <div key={c.id} className="px-4 py-2.5 text-sm flex justify-between items-center">
                      <span className="w-1/4 truncate font-medium">{c.nombre}</span>
                      <span className={`w-1/4 text-right ${c.gananciaNeta >= 0 ? "text-emerald-600" : "text-red-600"}`}>{formatMoney(c.gananciaNeta)}</span>
                      <span className={`w-1/4 text-right ${c.rendimientoPct >= 0 ? "text-emerald-600" : "text-red-600"}`}>{c.rendimientoPct}%</span>
                      <span className={`w-1/4 text-right ${c.cagr === null ? "text-slate-400" : c.cagr >= 0 ? "text-emerald-600" : "text-red-600"}`}>{c.cagr === null ? "— (poco historial)" : `${c.cagr}%`}</span>
                    </div>
                  ))}
                </div>
                <p className="text-xs text-slate-400">"Total período" es el rendimiento compuesto (TWR) desde el primer movimiento. "Anualizado" lo lleva a una tasa equivalente por año (CAGR), para poder comparar cuentas con distinto tiempo de historial; solo se calcula con 30 días de historial o más.</p>
                {inversiones.cuentas.some((c) => c.huboEventoSinBase) && (
                  <p className="text-xs text-amber-600">Alguna cuenta tuvo un ajuste de ganancia/pérdida mientras su saldo (antes del ajuste) era 0 o negativo; ese evento se sumó a la ganancia en $, pero se excluyó del cálculo del % compuesto para no distorsionarlo.</p>
                )}
                <p className="text-xs text-slate-400">Las transferencias hacia o desde estas cuentas se tratan como aportes/retiros de capital y no cuentan como rendimiento. Solo los movimientos de ingreso/gasto cargados directamente en la cuenta (el ajuste de fin de período) se consideran ganancia o pérdida real. Montos nominales, no ajustados por inflación.</p>
              </>
            )}
          </div>
        )}

        {tab === "eventos" && (
          <EventosSection fb={fb} uid={uid} personas={personas} eventos={eventos} setError={setError} />
        )}

        {tab === "historial" && (
          <div className="space-y-3">
            <div className="flex items-center gap-2">
              <label className="text-xs font-medium text-slate-500">Cuenta:</label>
              <select value={filterAccount} onChange={(e) => setFilterAccount(e.target.value)} className="rounded-md border border-slate-200 px-2 py-1.5 text-sm">
                <option value="todas">Todas</option>
                {misCuentas.map((a) => <option key={a.id} value={a.id}>{a.nombre}</option>)}
              </select>
            </div>
            <TransactionList items={historialFiltrado} accountName={accountName} personaName={personaName} categoryName={categoryName} onDelete={handleDeleteTransaction}
              misCategoriasGasto={misCategoriasGasto} onAssign={handleAssignCategory} onCreateAndAssign={handleCreateAndAssignCategory} />
            {historialFiltrado.length === 0 && <p className="text-sm text-slate-400">No hay movimientos para mostrar.</p>}
          </div>
        )}

        {tab === "cuentas" && (
          <div className="space-y-4">
            <form onSubmit={handleAddAccount} className="rounded-lg border border-slate-200 bg-white p-4 space-y-3">
              <div className="text-sm font-medium">Nueva cuenta</div>
              <div className="grid gap-3 sm:grid-cols-2">
                <div>
                  <label className="block text-xs font-medium text-slate-500 mb-1">Nombre</label>
                  <input type="text" value={newAccName} onChange={(e) => setNewAccName(e.target.value)} placeholder="Ej: Inversiones" className="w-full rounded-md border border-slate-200 px-3 py-2 text-sm" />
                </div>
                <div>
                  <label className="block text-xs font-medium text-slate-500 mb-1">Tipo (para las métricas de ahorro)</label>
                  <input type="text" list="tipos-cuenta" value={newAccTipo} onChange={(e) => setNewAccTipo(e.target.value)} placeholder="Ej: Plazo fijo, Bolsa, Cripto..." className="w-full rounded-md border border-slate-200 px-3 py-2 text-sm" />
                  <datalist id="tipos-cuenta"><option value="Banco/Efectivo" /><option value="Plazo fijo" /><option value="Bolsa" /><option value="Cripto" /><option value="Otro" /></datalist>
                </div>
                <div className="sm:col-span-2">
                  <label className="block text-xs font-medium text-slate-500 mb-1">Saldo inicial</label>
                  <input type="number" step="0.01" value={newAccBalance} onChange={(e) => setNewAccBalance(e.target.value)} placeholder="0.00" className="w-full rounded-md border border-slate-200 px-3 py-2 text-sm" />
                </div>
              </div>
              <button type="submit" className="flex items-center gap-1.5 rounded-md bg-slate-900 text-white px-4 py-2 text-sm font-medium hover:bg-slate-800"><Icon name="plus" size={14} />Agregar cuenta</button>
            </form>

            <div className="rounded-lg border border-slate-200 bg-white divide-y divide-slate-100">
              {misCuentas.map((a) => (
                <div key={a.id} className="flex items-center justify-between px-4 py-3">
                  <div>
                    <div className="flex items-center gap-1.5 font-medium text-sm flex-wrap">
                      {a.esPrincipal && <Icon name="star" size={13} className="text-amber-500 fill-amber-500" />}
                      {a.nombre}
                      {a.tipo && <span className="text-[10px] uppercase tracking-wide bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded">{a.tipo}</span>}
                    </div>
                    <div className="text-xs text-slate-500">Saldo actual: {formatMoney(balances[a.id])}</div>
                  </div>
                  <div className="flex items-center gap-3">
                    {!a.esPrincipal && <button onClick={() => handleSetPrincipal(a.id)} className="text-xs text-slate-500 hover:text-slate-800 underline">Marcar principal</button>}
                    <button onClick={() => handleDeleteAccount(a.id)} className="text-slate-400 hover:text-red-500"><Icon name="trash" size={15} /></button>
                  </div>
                </div>
              ))}
              {misCuentas.length === 0 && <div className="px-4 py-3 text-xs text-slate-400">Sin cuentas todavía.</div>}
            </div>
          </div>
        )}

        {tab === "categorias" && (
          <div className="space-y-4">
            <form onSubmit={handleAddCategory} className="rounded-lg border border-slate-200 bg-white p-4 space-y-3">
              <div className="text-sm font-medium">Nueva subcategoría</div>
              <div className="grid gap-3 sm:grid-cols-2">
                <div>
                  <label className="block text-xs font-medium text-slate-500 mb-1">Nombre</label>
                  <input type="text" value={newCatName} onChange={(e) => setNewCatName(e.target.value)} placeholder="Ej: Salidas" className="w-full rounded-md border border-slate-200 px-3 py-2 text-sm" />
                </div>
                <div>
                  <label className="block text-xs font-medium text-slate-500 mb-1">Tipo</label>
                  <select value={newCatType} onChange={(e) => setNewCatType(e.target.value)} className="w-full rounded-md border border-slate-200 px-3 py-2 text-sm">
                    <option value={TIPO.GASTO}>Gasto</option>
                    <option value={TIPO.INGRESO}>Ingreso</option>
                  </select>
                </div>
              </div>
              <button type="submit" className="flex items-center gap-1.5 rounded-md bg-slate-900 text-white px-4 py-2 text-sm font-medium hover:bg-slate-800"><Icon name="plus" size={14} />Agregar categoría</button>
            </form>

            <div className="grid gap-4 sm:grid-cols-2">
              {[TIPO.GASTO, TIPO.INGRESO].map((tipo) => (
                <div key={tipo} className="rounded-lg border border-slate-200 bg-white">
                  <div className="px-4 py-2 border-b border-slate-100 text-sm font-medium">{tipo === TIPO.GASTO ? "Gastos" : "Ingresos"}</div>
                  <div className="divide-y divide-slate-100">
                    {misCategorias.filter((c) => c.tipo === tipo).map((c) => (
                      <div key={c.id} className="flex items-center justify-between px-4 py-2 text-sm">
                        <span>{c.nombre}</span>
                        <button onClick={() => handleDeleteCategory(c.id)} className="text-slate-400 hover:text-red-500"><Icon name="trash" size={14} /></button>
                      </div>
                    ))}
                    {misCategorias.filter((c) => c.tipo === tipo).length === 0 && <div className="px-4 py-3 text-xs text-slate-400">Sin categorías todavía.</div>}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {tab === "perfil" && (
          <form onSubmit={handleGuardarPerfil} className="rounded-lg border border-slate-200 bg-white p-4 space-y-3 max-w-sm">
            <div className="text-sm font-medium">Tu perfil</div>
            <div>
              <label className="block text-xs font-medium text-slate-500 mb-1">Nombre</label>
              <input type="text" value={perfilNombre} onChange={(e) => setPerfilNombre(e.target.value)} className="w-full rounded-md border border-slate-200 px-3 py-2 text-sm" />
            </div>
            <button type="submit" className="rounded-md bg-slate-900 text-white px-4 py-2 text-sm font-medium hover:bg-slate-800">Guardar</button>
          </form>
        )}

        </SwipeViews>
      </div>
    </div>
  );
}

function AppGate({ fb, uid }) {
  const personasQ = useLiveQuery(fb, () => fb.collection(fb.db, "personas"), []);
  if (!personasQ.loaded) return <div className="min-h-screen flex items-center justify-center text-slate-400 text-sm">Cargando...</div>;
  const misPersona = personasQ.items.find((p) => p.id === uid);
  if (!misPersona) return <OnboardingScreen fb={fb} uid={uid} />;
  return <FinanceApp fb={fb} uid={uid} personas={personasQ.items} miNombre={misPersona.nombre} />;
}

function Root() {
  const [fb, setFb] = useState(window.__fb || null);
  const [user, setUser] = useState(undefined);

  useEffect(() => {
    if (fb) return;
    const handler = () => setFb(window.__fb);
    window.addEventListener("fb-ready", handler);
    return () => window.removeEventListener("fb-ready", handler);
  }, [fb]);

  useEffect(() => {
    if (!fb) return;
    const unsub = fb.onAuthStateChanged(fb.auth, (u) => setUser(u || null));
    return () => unsub();
  }, [fb]);

  if (!fb || user === undefined) return <div className="min-h-screen flex items-center justify-center text-slate-400 text-sm">Cargando...</div>;
  if (!user) return <LoginScreen fb={fb} />;
  return <AppGate fb={fb} uid={user.uid} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
